<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Boss Agent 新手引导</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="boss-agent-onboarding">
  <main class="onboarding-page">
    <header class="onboarding-hero">
      <div>
        <p class="onboarding-kicker">Boss Agent</p>
        <h1>新手引导</h1>
        <p>完成基础配置后，打开 Boss直聘 职位页即可使用岗位分析、匹配判断和沟通辅助。</p>
      </div>
      <button id="openBossBtn" type="button">打开 Boss直聘</button>
    </header>

    <section class="onboarding-steps" aria-label="新手引导步骤">
      <article>
        <span>1</span>
        <h2>配置 API Key</h2>
        <p>在配置中心填写 DeepSeek API Key，用于岗位分析和打招呼语生成。</p>
      </article>
      <article>
        <span>2</span>
        <h2>保存简历画像</h2>
        <p>粘贴或上传简历内容，Boss Agent 会基于你的经历进行匹配分析。</p>
      </article>
      <article>
        <span>3</span>
        <h2>打开 Boss直聘</h2>
        <p>进入 zhipin.com 的职位详情页，页面右侧会出现 Boss Agent 悬浮入口。</p>
      </article>
      <article>
        <span>4</span>
        <h2>开始分析岗位</h2>
        <p>点击悬浮入口查看岗位匹配度、风险提示、面试准备和沟通建议。</p>
      </article>
    </section>
  </main>

  <script src="onboarding.js"></script>
</body>
</html>
